<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Проверка Kwork Project Hider</title>
  <link rel="stylesheet" href="../src/content.css">
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      background: #f4f5f7;
      color: #222222;
      font-family: Arial, sans-serif;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 26px;
    }

    #add-project {
      margin: 0 0 16px;
      padding: 8px 12px;
    }

    .project-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 240px;
      gap: 20px;
      margin-bottom: 16px;
      padding: 20px;
      border: 1px solid #e2e4e7;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 2px 8px rgb(0 0 0 / 5%);
    }

    .project-card a {
      color: #222222;
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
    }

    .project-card p {
      margin: 12px 0;
      color: #555555;
      line-height: 1.5;
    }

    .budget {
      color: #04b70a;
      font-weight: 700;
    }

    .project-budget {
      text-align: right;
    }

    .project-budget p {
      margin: 0 0 8px;
    }
  </style>
  <script>
    window.fakeStorage = { hiddenProjectIds: [] };
    window.chrome = {
      runtime: {},
      storage: {
        local: {
          get(keys, callback) {
            callback(window.fakeStorage);
          },
          set(values, callback) {
            window.fakeStorage = values;
            document.documentElement.dataset.fakeStorage = JSON.stringify(values);
            callback();
          },
        },
        onChanged: {
          addListener() {},
        },
      },
    };
  </script>
</head>
<body>
  <main>
    <h1>Проекты</h1>
    <button id="add-project" type="button">Добавить проект динамически</button>
    <article class="project-card">
      <div>
        <a href="https://kwork.ru/projects/3151203/view">Создать проект модульного дома</a>
        <p>Необходимо подготовить проект и комплект чертежей.</p>
      </div>
      <div class="project-budget">
        <p class="budget">Желаемый бюджет: до 20 000 ₽</p>
        <p>Допустимый: до 40 000 ₽</p>
      </div>
    </article>
    <article class="project-card">
      <div>
        <a href="https://kwork.ru/projects/3193769/view">Дизайн интернет-магазина</a>
        <p>Нужен адаптивный дизайн для сайта и мобильных устройств.</p>
      </div>
      <div class="project-budget">
        <p class="budget">Желаемый бюджет: до 50 000 ₽</p>
        <p>Допустимый: до 80 000 ₽</p>
      </div>
    </article>
  </main>
  <script>
    document.querySelector('#add-project').addEventListener('click', () => {
      const card = document.createElement('article');
      card.className = 'project-card';
      card.innerHTML = '<div><a href="https://kwork.ru/projects/3216003/view">Доработать презентацию</a><p>Новая карточка добавлена после загрузки страницы.</p></div><div class="project-budget"><p class="budget">Желаемый бюджет: до 5 000 ₽</p><p>Допустимый: до 10 000 ₽</p></div>';
      document.querySelector('main').append(card);
    });
  </script>
  <script src="../src/core.js"></script>
  <script src="../src/content.js"></script>
</body>
</html>
